<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MoodyAI — Sign in</title>
<style>:root{color-scheme:dark;--bg:#090b0d;--panel:#111519;--line:#293039;--text:#eef2f4;--muted:#9aa5ad;--accent:#273b53}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--text);font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.card{width:min(420px,calc(100vw - 32px));background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:28px}h1{margin:0 0 6px;font-size:24px}p{margin:0 0 22px;color:var(--muted)}label{display:block;font-size:13px;margin-bottom:7px}input{width:100%;padding:12px;border-radius:8px;border:1px solid var(--line);background:#0d1115;color:var(--text);font-size:16px}button{width:100%;margin-top:14px;padding:12px;border:1px solid #3b5878;border-radius:8px;background:var(--accent);color:var(--text);font-weight:700;cursor:pointer}.error{margin-top:12px;color:#e1a1a1;display:none}.small{font-size:12px;color:var(--muted);margin-top:16px}</style></head>
<body><main class="card"><h1>MoodyAI</h1><p>Sign in to open the learning console.</p><form id="login"><label for="password">Password</label><input id="password" name="password" type="password" autocomplete="current-password" required autofocus><button type="submit">Sign in</button><div id="error" class="error"></div></form><div class="small">The public health endpoint remains available at <code>/health</code>.</div></main>
<script>document.getElementById('login').addEventListener('submit',async e=>{e.preventDefault();const error=document.getElementById('error');error.style.display='none';const body=new URLSearchParams({password:document.getElementById('password').value});const r=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});if(r.ok){location.href='/learning';return}let message='Sign-in failed.';try{const d=await r.json();message=d.detail||message}catch{}error.textContent=message;error.style.display='block'})</script></body></html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MoodyAI — Today</title>
<style>
:root{color-scheme:dark;--bg:#090b0d;--panel:#111519;--panel2:#151a1f;--line:#293039;--text:#eef2f4;--muted:#9aa5ad;--accent:#84a7d8;--ok:#8bbf9f;--warn:#d3b778}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{max-width:980px;margin:0 auto;padding:30px}.top{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;margin-bottom:22px}.brand h1{margin:0 0 5px;font-size:24px}.brand p,.muted{margin:0;color:var(--muted)}button,a.button{background:#1b2229;border:1px solid var(--line);color:var(--text);border-radius:8px;padding:9px 13px;text-decoration:none;font-weight:650;cursor:pointer}.summary{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:20px;margin-bottom:16px}.summary h2{font-size:22px;margin:0 0 7px}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:17px}.metric{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:13px}.metric .k{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em}.metric .v{font-size:22px;font-weight:750}.list{display:grid;gap:12px}.item{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px}.row{display:flex;justify-content:space-between;gap:15px}.name{font-size:18px;font-weight:750}.badge{font-size:11px;border:1px solid var(--line);border-radius:999px;padding:3px 8px;color:var(--muted);white-space:nowrap}.action{font-size:18px;margin:13px 0 6px}.why{color:var(--muted)}.state{margin-top:13px;font-size:12px;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;font-weight:700}.empty{text-align:center;padding:42px;color:var(--muted)}.nav{display:flex;gap:8px;align-items:center}.status{font-size:12px;color:var(--muted);margin-top:7px;text-align:right}@media(max-width:700px){.metrics{grid-template-columns:repeat(2,1fr)}.top{display:block}.nav{margin-top:15px}.row{align-items:flex-start}}
</style>
</head>
<body><main class="wrap">
<div class="top"><div class="brand"><h1>Today</h1><p>Only the work that genuinely needs your attention.</p></div><div><div class="nav"><a class="button" href="/learning">Learning</a><button id="refresh">Refresh</button></div><div id="status" class="status"></div></div></div>
<section id="summary" class="summary"></section><section id="items" class="list"></section>
</main>
<script>
const $=id=>document.getElementById(id);function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}function cap(v){return String(v||'').replaceAll('_',' ').replace(/\b\w/g,c=>c.toUpperCase())}
async function api(path){const r=await fetch(path);const d=await r.json();if(!r.ok)throw new Error(d.detail||`HTTP ${r.status}`);return d}
function render(d){const c=d.counts||{};$('summary').innerHTML=`<h2>${esc(d.headline)}</h2><p class="muted">${esc(d.guidance)}</p><div class="metrics">${[['Needs action',c.needs_action||0],['Awaiting result',c.awaiting_outcome||0],['High priority',c.high_priority||0],['Hidden as complete',c.suppressed||0]].map(([k,v])=>`<div class="metric"><div class="k">${esc(k)}</div><div class="v">${esc(v)}</div></div>`).join('')}</div>`;$('items').innerHTML=(d.items||[]).map((l,i)=>`<article class="item"><div class="row"><div><div class="name">${i+1}. ${esc(l.name)}</div><div class="muted">${esc(l.stage)} · ${esc(l.source)}</div></div><span class="badge">${esc(l.temperature)} ${esc(l.score)}</span></div><div class="state">${esc(cap(l.workflow_state||'action_needed'))}</div><div class="action">${esc(l.recommendedAction||'Review this lead today.')}</div><div class="why">${esc(l.whyNow||'Current CRM signals make this lead worth reviewing now.')}</div></article>`).join('')||'<div class="empty">Nothing needs action right now. MoodyAI is still watching Follow Up Boss.</div>'}
async function refresh(){ $('status').textContent='Checking…';try{const d=await api('/api/today');render(d);$('status').textContent=`Updated ${new Date(d.generated_at).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'})}`}catch(e){$('status').textContent=e.message}}
$('refresh').onclick=refresh;refresh();setInterval(refresh,60000);
</script></body></html>
